###############################################
# VideoManch – MediaMTX v1.9.x configuration
# Used by video-manch-live-ingest when ENABLE_RTMP_SERVER=true
#
# Environment variables substituted at startup:
#   PORT          – Node.js HTTP port (for webhook callbacks)
#   RTMP_PORT     – RTMP listen port  (default 1935)
#   HLS_HTTP_PORT – HLS HTTP port     (default 8888)
###############################################

logLevel: info
logDestinations: [stdout]

# ── Auth ──────────────────────────────────────────────────────────────────────
# External HTTP auth: MediaMTX POSTs here before accepting any publisher.
# Return 200 to allow, non-200 to reject.
authMethod: http
authHTTPAddress: http://127.0.0.1:$PORT/mediamtx/auth
authHTTPExclude:
  - action: read
  - action: playback
  - action: api
  - action: metrics
  - action: pprof

# ── Disable unused protocols ──────────────────────────────────────────────────
rtsp: no
webrtc: no
srt: no

# ── RTMP ingest ───────────────────────────────────────────────────────────────
rtmp: yes
rtmpAddress: :$RTMP_PORT

# ── HLS output ────────────────────────────────────────────────────────────────
hls: yes
hlsAddress: :$HLS_HTTP_PORT
hlsAllowOrigin: "*"
# 6 segments × 2 s = 12 s window; regular HLS (no LL-HLS)
hlsSegmentCount: 6
hlsSegmentDuration: 2s

# ── Path rules ────────────────────────────────────────────────────────────────
paths:
  # Match any path under "live/" – stream key is the segment after the slash
  "~^live/":
    # Called when a publisher is accepted and stream is ready
    # $MTX_PATH / $MTX_ID are set by MediaMTX at runtime
    runOnReady: >
      curl -sf -X POST "http://127.0.0.1:$PORT/mediamtx/on-publish"
      -H "Content-Type: application/json"
      -d "{\"path\":\"$MTX_PATH\",\"id\":\"$MTX_ID\"}"
    runOnReadyRestart: no

    # Called when the publisher disconnects / stream is no longer available
    runOnNotReady: >
      curl -sf -X POST "http://127.0.0.1:$PORT/mediamtx/on-unpublish"
      -H "Content-Type: application/json"
      -d "{\"path\":\"$MTX_PATH\",\"id\":\"$MTX_ID\"}"
